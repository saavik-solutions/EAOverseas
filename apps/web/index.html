<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAOverseas</title>
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="root"></div>
  <div id="error-display" style="position:fixed; bottom:0; left:0; width:100%; background:red; color:white; z-index:9999; font-family:monospace; padding:10px; display:none; max-height: 50vh; overflow: auto;"></div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      var display = document.getElementById('error-display');
      display.style.display = 'block';
      display.innerHTML += 'Error: ' + msg + '<br>URL: ' + url + '<br>Line: ' + lineNo + '<br>Stack: ' + (error ? error.stack : 'no stack') + '<hr>';
      return false;
    };
    window.onunhandledrejection = function(event) {
      var display = document.getElementById('error-display');
      display.style.display = 'block';
      display.innerHTML += 'Unhandled Promise Rejection: ' + event.reason + '<hr>';
    };
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
